name: Deploy Dashboards to GitHub Pages

on:
  push:
    branches: ['main']
    paths:
      - 'cart-vital-dashboard/**'
      - 'med-xai-dashboard/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── CART VITAL 빌드 ──
      - name: Install dependencies (CART VITAL)
        working-directory: cart-vital-dashboard
        run: npm ci

      - name: Build (CART VITAL)
        working-directory: cart-vital-dashboard
        run: npm run build

      # ── Med XAI 빌드 ──
      - name: Install dependencies (Med XAI)
        working-directory: med-xai-dashboard
        run: npm install

      - name: Build (Med XAI)
        working-directory: med-xai-dashboard
        run: npm run build

      # ── 합치기: CART VITAL은 루트, Med XAI는 /med-xai/ ──
      - name: Combine builds
        run: |
          mkdir -p combined
          cp -r cart-vital-dashboard/dist/* combined/
          mkdir -p combined/med-xai
          cp -r med-xai-dashboard/dist/* combined/med-xai/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'combined'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
